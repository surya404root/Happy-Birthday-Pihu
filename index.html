<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Pihu 💖</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:black;
color:white;
}

/* ===== GLOW BACKGROUND ===== */

.bgGlow{
position:absolute;
width:500px;
height:500px;
background:radial-gradient(circle,
rgba(255,77,166,0.25),
transparent 70%);
filter:blur(80px);
z-index:0;
animation:moveGlow 8s infinite alternate;
}

.bgGlow:nth-child(2){
right:-150px;
top:-150px;
animation-delay:3s;
}

@keyframes moveGlow{
from{transform:translate(-20px,-20px);}
to{transform:translate(20px,20px);}
}

/* ===== FLOATING EMOJIS ===== */

.heart{
position:absolute;
bottom:-50px;
font-size:20px;
animation:floatHeart linear infinite;
opacity:0.7;
z-index:1;
pointer-events:none;
}

@keyframes floatHeart{
0%{transform:translateY(0) scale(0.5);opacity:0;}
20%{opacity:1;}
100%{transform:translateY(-120vh) scale(1.3);opacity:0;}
}

/* ===== MUSIC BUTTON ===== */

#musicBtn{
position:fixed;
top:12px;
right:12px;
z-index:999;
padding:10px 14px;
border:none;
border-radius:25px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px rgba(255,255,255,0.3);
transition:0.3s;
}

#musicBtn:hover{
transform:scale(1.1);
}

/* ===== APP ===== */

.app{
position:relative;
z-index:2;
height:100%;
display:flex;
flex-direction:column;
}

/* ===== TOP TITLE ===== */

.topbar{
padding:15px 20px;
display:flex;
justify-content:flex-start;
}

.logo{
font-size:24px;
font-weight:bold;
color:#ff9ad5;
text-shadow:0 0 15px #ff4da6;
}

/* ===== PAGE SYSTEM ===== */

.page{
flex:1;
display:none;
justify-content:center;
align-items:center;
flex-direction:column;
padding:20px;
text-align:center;
animation:fade 0.5s ease;
}

.page.active{
display:flex;
}

@keyframes fade{
from{opacity:0;transform:translateY(15px);}
to{opacity:1;transform:translateY(0);}
}

/* ===== TITLE ===== */

.mainTitle{
font-size:clamp(2rem,7vw,4rem);
text-shadow:0 0 25px #ff4da6;
animation:titleFloat 2s infinite alternate;
}

@keyframes titleFloat{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}

.sub{
margin-top:18px;
max-width:90%;
font-size:clamp(0.9rem,3vw,1.2rem);
opacity:0.9;
line-height:1.6;
}

/* ===== CAKE ===== */

.cake{
margin-top:25px;
filter:drop-shadow(0 0 25px #ff99cc);
}

.layer{
width:min(200px,70vw);
height:45px;
border-radius:15px;
margin:6px auto;
}

.layer1{background:#ff5ca8;}
.layer2{background:#ffd166;}
.layer3{background:#6ed6ff;}

.candle{
width:12px;
height:45px;
background:white;
margin:auto;
border-radius:10px;
}

.flame{
width:18px;
height:18px;
background:gold;
border-radius:50%;
margin:auto;
box-shadow:0 0 20px gold;
animation:flicker 0.2s infinite;
}

@keyframes flicker{
50%{transform:scale(1.3);}
}

/* ===== MESSAGE BOX ===== */

.messageCard{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.15);
backdrop-filter:blur(12px);
padding:25px;
border-radius:25px;
width:min(90%,350px);
line-height:1.7;
}

/* ===== PARTY ===== */

.partyTitle{
font-size:clamp(1.8rem,6vw,3rem);
text-shadow:0 0 15px #ff99cc;
}

/* ===== NAV ===== */

nav{
display:flex;
justify-content:space-around;
align-items:center;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
padding:10px;
flex-wrap:wrap;
}

nav button{
background:none;
border:none;
color:white;
font-size:clamp(10px,2.5vw,14px);
cursor:pointer;
}

nav button:hover{
color:#ff9ad5;
transform:scale(1.1);
}

/* ===== CANVAS ===== */

canvas{
position:fixed;
top:0;
left:0;
pointer-events:none;
z-index:1;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bgGlow"></div>
<div class="bgGlow"></div>

<!-- FIREWORKS -->
<canvas id="canvas"></canvas>

<!-- MUSIC -->
<audio id="music" loop>
<source src="cute_happy_birthday.mp3" type="audio/mpeg">
</audio>

<button id="musicBtn">🎵 Music</button>

<div class="app">

<!-- TOP -->
<div class="topbar">
<div class="logo">💖 Pihu</div>
</div>

<!-- HOME -->
<section class="page active" id="home">
<div class="mainTitle">Happy Birthday Pihu 🎉</div>
<div class="sub">Wishing you a magical day full of love and happiness ✨</div>
</section>

<!-- CAKE -->
<section class="page" id="cake">

<div class="cake">
<div class="flame"></div>
<div class="candle"></div>
<div class="layer layer1"></div>
<div class="layer layer2"></div>
<div class="layer layer3"></div>
</div>

<div class="sub">Make a wish Pihu 💖</div>

</section>

<!-- WISHES -->
<section class="page" id="message">

<div class="messageCard">
✨ Dear Pihu ✨<br><br>
You are special, beautiful and amazing 💖<br><br>
Wishing you endless happiness 🎂✨
</div>

</section>

<!-- PARTY -->
<section class="page" id="party">

<div class="partyTitle">
🎆 Party Time Pihu 🎆
</div>

<div class="sub">
When are you giving party to me? 🍕🎂
</div>

</section>

</div>

<!-- NAV -->
<nav>
<button onclick="showPage('home')">🏠 Home</button>
<button onclick="showPage('cake')">🎂 Cake</button>
<button onclick="showPage('message')">💌 Wishes</button>
<button onclick="showPage('party')">🎆 Party</button>
</nav>

<script>

/* PAGE SWITCH */
function showPage(id){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* MUSIC BUTTON */
const music = document.getElementById("music");
const btn = document.getElementById("musicBtn");

let playing = false;

btn.addEventListener("click",()=>{
if(!playing){
music.play();
btn.innerHTML="⏸ Pause";
playing=true;
}else{
music.pause();
btn.innerHTML="🎵 Music";
playing=false;
}
});

/* FLOATING EMOJIS */
const emojis=["💖","✨","🌸","🎉","💕"];

for(let i=0;i<30;i++){
let d=document.createElement("div");
d.className="heart";
d.innerHTML=emojis[Math.floor(Math.random()*emojis.length)];
d.style.left=Math.random()*100+"vw";
d.style.animationDuration=(5+Math.random()*6)+"s";
document.body.appendChild(d);
}

/* FIREWORKS */
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

canvas.width=innerWidth;
canvas.height=innerHeight;

let particles=[];

function boom(x,y){
for(let i=0;i<50;i++){
particles.push({
x,y,
vx:(Math.random()-0.5)*6,
vy:(Math.random()-0.5)*6,
a:1
});
}
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach((p,i)=>{
p.x+=p.vx;
p.y+=p.vy;
p.a-=0.015;

ctx.fillStyle=`rgba(255,105,180,${p.a})`;
ctx.beginPath();
ctx.arc(p.x,p.y,3,0,Math.PI*2);
ctx.fill();

if(p.a<=0)particles.splice(i,1);
});

requestAnimationFrame(animate);
}
animate();

/* AUTO FIREWORKS */
setInterval(()=>{
if(document.getElementById("party").classList.contains("active")){
boom(Math.random()*innerWidth,Math.random()*innerHeight/2);
}
},1200);

/* RESIZE */
window.addEventListener("resize",()=>{
canvas.width=innerWidth;
canvas.height=innerHeight;
});

</script>

</body>
</html>
